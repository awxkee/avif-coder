name: Build to Maven Local

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'master'
    tags-ignore:
      - '*'
  pull_request:
    branches:
      - 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust nightly + Android targets
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: rust-src
          targets: >-
            aarch64-linux-android,
            x86_64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: avifpixart

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d
          add-to-path: true

      - name: Configure NDK linkers for Cargo
        run: |
          NDK_BIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          mkdir -p avifpixart/.cargo
          cat > avifpixart/.cargo/config.toml << EOF
          [target.aarch64-linux-android]
          linker = "$NDK_BIN/aarch64-linux-android21-clang"
          ar     = "$NDK_BIN/llvm-ar"
          
          [target.x86_64-linux-android]
          linker = "$NDK_BIN/x86_64-linux-android21-clang"
          ar     = "$NDK_BIN/llvm-ar"
          
          [target.armv7-linux-androideabi]
          linker = "$NDK_BIN/armv7a-linux-androideabi21-clang"
          ar     = "$NDK_BIN/llvm-ar"
          
          [target.i686-linux-android]
          linker = "$NDK_BIN/i686-linux-android21-clang"
          ar     = "$NDK_BIN/llvm-ar"
          EOF

      - name: Build Rust (avifpixart → all Android ABIs)
        working-directory: avifpixart
        run: |
          set -e
          
          # arm64-v8a — full feature set (NEON + i8mm + SVE)
          RUSTFLAGS="-C link-arg=-Wl,-z,max-page-size=16384 \
                     -C target-feature=+neon \
                     -C opt-level=3 \
                     -C strip=symbols" \
          cargo +nightly build \
            -Z build-std=std \
            --target aarch64-linux-android \
            --features rdm,i8mm,sve \
            --release \
            --manifest-path Cargo.toml
          
          RUSTFLAGS="-C link-arg=-Wl,-z,max-page-size=16384 \
                     -C opt-level=z \
                     -C strip=symbols" \
          cargo +nightly build \
            -Z build-std=std \
            --no-default-features \
            --target x86_64-linux-android \
            --release \
            --manifest-path Cargo.toml
          
          # armeabi-v7a — size-optimised
          RUSTFLAGS="-C link-arg=-Wl,-z,max-page-size=16384 \
                     -C opt-level=z \
                     -C strip=symbols" \
          cargo +nightly build \
            -Z build-std=std \
            --no-default-features \
            --target armv7-linux-androideabi \
            --release \
            --manifest-path Cargo.toml
          
          # x86 — size-optimised
          RUSTFLAGS="-C link-arg=-Wl,-z,max-page-size=16384 \
                     -C opt-level=z \
                     -C strip=symbols" \
          cargo +nightly build \
            -Z build-std=std \
            --target i686-linux-android \
            --release \
            --manifest-path Cargo.toml

      - name: Copy Rust static libs to JNI tree
        run: |
          set -e
          BASE=avifpixart/target
          DEST=avif-coder/src/main/cpp/lib
          
          mkdir -p $DEST/arm64-v8a $DEST/x86_64 $DEST/armeabi-v7a $DEST/x86
          
          cp $BASE/aarch64-linux-android/release/libavifweaver.a     $DEST/arm64-v8a/libavifweaver.a
          cp $BASE/x86_64-linux-android/release/libavifweaver.a      $DEST/x86_64/libavifweaver.a
          cp $BASE/armv7-linux-androideabi/release/libavifweaver.a   $DEST/armeabi-v7a/libavifweaver.a
          cp $BASE/i686-linux-android/release/libavifweaver.a        $DEST/x86/libavifweaver.a
      - name: set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle
      - name: Set version variable
        run: echo "GITHUB_REF_NAME=$GITHUB_REF_NAME" >> $GITHUB_ENV
      - name: Compile to maven local
        env:
          VERSION_NAME: "2.0.0"
          ORG_GRADLE_PROJECT_mavenCentralUsername: "stub_name"
          ORG_GRADLE_PROJECT_mavenCentralPassword: "stub_password"
          ORG_GRADLE_PROJECT_signingInMemoryKey: "stub"
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: "stub"
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: "stub"
        run: bash ./gradlew avif-coder:publishToMavenLocal